<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Raquettes d'Anne C - Catalogue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        :root { 
            --primary: #0f172a; 
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            transition: background-color 0.3s ease; 
        }

        .modal-open { overflow: hidden; }

        /* Animation du titre dynamique */
        .dynamic-title {
            background: linear-gradient(300deg, #3b82f6, #8b5cf6, #ec4899, #3b82f6);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-shift 12s ease infinite;
        }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .product-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        
        .skeleton { 
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); 
            background-size: 200% 100%; 
            animation: loading 1.5s infinite; 
        }

        @keyframes loading { 
            0% { background-position: 200% 0; } 
            100% { background-position: -200% 0; } 
        }

        .glass { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px); 
        }

        .thumb-active { border-color: #8b5cf6 !important; transform: scale(0.95); }

        /* Pagination des images sur la carte */
        .img-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transition: all 0.2s;
            cursor: pointer;
        }
        .img-dot.active {
            background: white;
            transform: scale(1.3);
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        @media (prefers-color-scheme: dark) {
            body { background-color: #020617; color: #f8fafc; }
            .glass { background: rgba(15, 23, 42, 0.8); }
            .bg-white { background-color: #1e293b; }
            .text-slate-900 { color: #f8fafc; }
        }
    </style>
</head>
<body class="bg-[#fdfdfd] min-h-screen">

    <div id="app" class="max-w-7xl mx-auto px-4 sm:px-6 py-10">
        <!-- En-tête -->
        <header class="mb-12 flex flex-col items-center relative">
            <div class="w-full flex justify-between items-start mb-6">
                <button id="showFavsBtn" class="bg-white border border-slate-200 p-2.5 rounded-2xl shadow-sm hover:bg-rose-50 hover:border-rose-100 transition-all group">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400 group-hover:text-rose-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                    </svg>
                </button>
                <button id="openAdminBtn" class="bg-slate-900 text-white px-5 py-2.5 rounded-2xl text-sm font-bold shadow-lg hover:bg-slate-800 transition-all flex items-center gap-2 active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd" /></svg>
                    <span>Admin</span>
                </button>
            </div>
            <h1 class="text-5xl md:text-6xl font-black text-slate-900 mb-2 tracking-tight dynamic-title">Les Raquettes d'Anne C</h1>
            <p class="text-slate-500 font-medium text-center">Une sélection d'objets uniques et premium</p>
        </header>

        <!-- Barre de Filtres -->
        <div class="glass sticky top-6 z-40 p-4 rounded-[2rem] shadow-xl border border-white/20 mb-10">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-center">
                <input type="text" id="searchInput" placeholder="Rechercher une raquette..." class="w-full px-6 py-3 bg-white/50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-purple-500/10 focus:border-purple-500 outline-none transition-all">
                <div class="flex gap-2">
                    <select id="categoryFilter" class="flex-1 px-4 py-3 bg-white/50 border border-slate-200 rounded-2xl outline-none cursor-pointer text-sm font-semibold"><option value="all">Catégories</option></select>
                    <select id="statusFilter" class="flex-1 px-4 py-3 bg-white/50 border border-slate-200 rounded-2xl outline-none cursor-pointer text-sm font-semibold">
                        <option value="all">Statut</option><option value="Disponible">Disponible</option><option value="Réservé">Réservé</option><option value="Vendu">Vendu</option>
                    </select>
                </div>
                <button onclick="resetFilters()" class="text-sm font-bold text-slate-400 hover:text-purple-600 transition-colors">Réinitialiser</button>
            </div>
        </div>

        <div id="loader" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"><div class="rounded-3xl h-96 skeleton"></div><div class="rounded-3xl h-96 skeleton"></div></div>
        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
        <div id="noResult" class="hidden text-center py-32 text-slate-500 font-bold text-lg">Aucune raquette trouvée.</div>
    </div>

    <!-- Modale Détail -->
    <div id="detailModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md transition-opacity">
        <div class="bg-white w-full max-w-5xl rounded-[3rem] shadow-2xl overflow-hidden relative max-h-[90vh] overflow-y-auto transform transition-transform scale-95" id="modalContainer">
            <div class="flex flex-col md:flex-row h-full">
                <!-- Section Image Galerie -->
                <div class="w-full md:w-3/5 relative flex flex-col bg-slate-50">
                    <div class="flex-grow flex items-center justify-center overflow-hidden h-[400px] md:h-[600px]">
                        <img id="modalImg" src="" class="w-full h-full object-cover">
                    </div>
                    <div id="modalGallery" class="flex gap-2 p-4 overflow-x-auto bg-white/80 backdrop-blur-md border-t border-slate-100"></div>
                    <button id="closeModal" class="absolute top-6 left-6 bg-white/90 p-3 rounded-full shadow-lg text-slate-900 hover:scale-110 transition-transform">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
                    </button>
                </div>
                <!-- Section Contenu -->
                <div class="w-full md:w-2/5 p-10 flex flex-col">
                    <span id="modalCat" class="text-xs font-black text-purple-600 uppercase tracking-widest mb-2"></span>
                    <h2 id="modalTitle" class="text-4xl font-black text-slate-900 mb-2 leading-tight"></h2>
                    <div id="modalPrice" class="text-4xl font-light text-slate-400 mb-8"></div>
                    <p id="modalDesc" class="text-slate-600 leading-relaxed text-lg mb-8 flex-grow"></p>
                    <div class="space-y-3">
                        <a id="modalLBCLink" href="#" target="_blank" class="block w-full bg-[#f56b2a] text-white font-black py-5 rounded-3xl text-center shadow-lg hover:bg-[#ff7e42] transition-all uppercase tracking-widest text-sm">Voir sur Leboncoin</a>
                        <button onclick="toggleFavoriteCurrent()" id="modalFavBtn" class="w-full bg-slate-100 text-slate-900 font-bold py-4 rounded-3xl transition-all flex items-center justify-center gap-2">Favoris</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modale Login Admin -->
    <div id="loginModal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl">
            <h3 class="text-2xl font-black text-slate-900 mb-6">Accès Admin</h3>
            <form id="loginForm" class="space-y-4">
                <input type="password" id="adminPassword" placeholder="Mot de passe" required class="w-full px-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-purple-500">
                <div class="flex gap-4 pt-2">
                    <button type="button" id="cancelLogin" class="flex-1 font-bold text-slate-400">Retour</button>
                    <button type="submit" class="flex-1 bg-slate-900 text-white px-5 py-4 rounded-2xl font-bold">Connexion</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modale Formulaire Admin -->
    <div id="adminModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-md">
        <div class="bg-white w-full max-w-2xl rounded-[3rem] shadow-2xl p-10 max-h-[90vh] overflow-y-auto relative">
            <button id="closeAdminBtn" class="absolute top-8 right-8 text-slate-400 hover:text-slate-900 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
            <h2 class="text-3xl font-black mb-8 text-slate-900">Ajouter une raquette</h2>
            <form id="adminForm" class="space-y-5">
                <input type="text" name="titre" placeholder="Modèle de la raquette" required class="w-full px-6 py-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" name="prix" placeholder="Prix (€)" required class="w-full px-6 py-4 bg-slate-50 rounded-2xl outline-none border border-slate-100">
                    <input type="text" name="categorie" placeholder="Catégorie (ex: Wilson, Babolat)" required class="w-full px-6 py-4 bg-slate-50 rounded-2xl outline-none border border-slate-100">
                </div>
                <select name="statut" class="w-full px-6 py-4 bg-slate-50 rounded-2xl outline-none border border-slate-100"><option value="Disponible">Disponible</option><option value="Réservé">Réservé</option><option value="Vendu">Vendu</option></select>
                <textarea name="description" placeholder="Détails (poids, tamis, cordage...)" rows="3" class="w-full px-6 py-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none resize-none"></textarea>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Lien photos (séparés par une virgule)</label>
                    <textarea name="photo_url" placeholder="URL Image 1, URL Image 2..." class="w-full px-6 py-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none resize-none" rows="2"></textarea>
                </div>
                <input type="url" name="lien_leboncoin" placeholder="Lien vers l'annonce Leboncoin" class="w-full px-6 py-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none">
                <button type="submit" id="submitAdmin" class="w-full bg-purple-600 text-white font-black py-5 rounded-3xl shadow-xl hover:bg-purple-700 transition-all">PUBLIER L'ANNONCE</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbyoUUiv0lsfD84HQuIuCMpWo4eJHlTXz11LFDN6ZqzlWkichE4Tjeiyvmf3T8oiG21SyQ/exec';
        const ADMIN_PASSWORD = 'admin123';
        let products = [];
        let favorites = JSON.parse(localStorage.getItem('catalogue_favs')) || [];
        let currentItem = null;
        let showOnlyFavs = false;

        const getPhotosArray = (urlStr, title) => {
            if (!urlStr || urlStr.trim() === "") return [`https://placehold.co/800x600/f1f5f9/64748b?text=${encodeURIComponent(title)}`];
            return urlStr.split(',').map(url => url.trim()).filter(url => url !== "");
        };

        const normalizeImageUrl = (url, title) => {
            if (!url) return `https://placehold.co/800x600/f1f5f9/64748b?text=${encodeURIComponent(title || 'Image')}`;
            if (url.includes("drive.google.com")) {
                const id = url.match(/id=([^&]+)/)?.[1] || url.match(/\/d\/([^/]+)/)?.[1];
                return id ? `https://drive.google.com/thumbnail?id=${id}&sz=w1200` : url;
            }
            return url;
        };

        const isNewProduct = (date) => {
            if (!date) return false;
            return (new Date() - new Date(date)) / (1000 * 60 * 60 * 24) < 7;
        };

        const getStatusStyles = (status) => {
            const s = (status || '').toLowerCase();
            if (s === 'vendu') return 'bg-rose-50 text-rose-600 border-rose-100';
            if (s === 'réservé' || s === 'reserve') return 'bg-amber-50 text-amber-600 border-amber-100';
            return 'bg-emerald-50 text-emerald-600 border-emerald-100';
        };

        // Fonction pour changer l'image d'une carte sans ouvrir la modale
        window.changeCardImage = (event, productId, photoIdx) => {
            event.stopPropagation();
            const product = products.find(p => p.titre === productId);
            if (!product) return;
            
            const photos = getPhotosArray(product.photo_url, product.titre);
            const imgEl = document.getElementById(`img-${productId.replace(/\s+/g, '-')}`);
            if (imgEl) {
                imgEl.src = normalizeImageUrl(photos[photoIdx], product.titre);
            }

            // Mettre à jour les points
            const dotContainer = event.target.parentElement;
            Array.from(dotContainer.children).forEach((dot, idx) => {
                if (idx === photoIdx) dot.classList.add('active');
                else dot.classList.remove('active');
            });
        };

        const renderGrid = (items) => {
            const grid = document.getElementById('productGrid');
            const noRes = document.getElementById('noResult');
            grid.innerHTML = '';
            if (items.length === 0) { noRes.classList.remove('hidden'); return; }
            noRes.classList.add('hidden');

            items.forEach(item => {
                const isFav = favorites.includes(item.titre);
                const photos = getPhotosArray(item.photo_url, item.titre);
                const card = document.createElement('div');
                card.className = 'product-card bg-white rounded-[2rem] border border-slate-100 overflow-hidden shadow-sm flex flex-col h-full group relative';
                
                const titleForId = item.titre.replace(/\s+/g, '-');
                const titleForJs = item.titre.replace(/'/g, "\\'");
                
                // Générer les points de navigation si plusieurs photos
                let dotsHtml = '';
                if (photos.length > 1) {
                    dotsHtml = `<div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-1.5 opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-20">`;
                    photos.forEach((_, idx) => {
                        dotsHtml += `<div class="img-dot ${idx === 0 ? 'active' : ''}" onclick="changeCardImage(event, '${titleForJs}', ${idx})"></div>`;
                    });
                    dotsHtml += `</div>`;
                }

                card.innerHTML = `
                    <div class="h-72 w-full relative overflow-hidden flex-shrink-0 cursor-pointer" onclick="openModal('${titleForJs}')">
                        <img id="img-${titleForId}" src="${normalizeImageUrl(photos[0], item.titre)}" class="h-full w-full object-cover transition-all duration-700" loading="lazy">
                        ${dotsHtml}
                        ${isNewProduct(item.date_ajout) ? `<div class="absolute top-4 left-4"><span class="bg-purple-600 text-white rounded-full text-[9px] font-black uppercase px-3 py-1.5 shadow-lg">Nouveau</span></div>` : ''}
                        <div class="absolute top-4 right-4"><span class="px-3 py-1.5 rounded-full text-[9px] font-black uppercase border glass ${getStatusStyles(item.statut)}">${item.statut || 'Disponible'}</span></div>
                    </div>
                    <button onclick="toggleFavorite('${titleForJs}')" class="absolute top-[260px] right-6 z-10 bg-white p-3 rounded-2xl shadow-xl hover:scale-110 active:scale-90 transition-all border border-slate-50">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ${isFav ? 'fill-rose-500 text-rose-500' : 'text-slate-300'}" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg>
                    </button>
                    <div class="p-8 pt-6 flex flex-col justify-between flex-grow cursor-pointer" onclick="openModal('${titleForJs}')">
                        <div>
                            <span class="text-[10px] font-bold text-purple-600 uppercase tracking-widest">${item.categorie || 'Raquette'}</span>
                            <h3 class="text-xl font-bold text-slate-900 mt-1 mb-2 line-clamp-1">${item.titre}</h3>
                            <p class="text-slate-500 text-sm line-clamp-2 leading-relaxed">${item.description || "Aucune description."}</p>
                        </div>
                        <div class="flex items-center justify-between mt-6">
                            <span class="text-3xl font-light text-slate-900">${item.prix}€</span>
                            <div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 group-hover:bg-purple-600 group-hover:text-white transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" /></svg>
                            </div>
                        </div>
                    </div>`;
                grid.appendChild(card);
            });
        };

        const openModal = (title) => {
            currentItem = products.find(p => p.titre === title);
            if (!currentItem) return;
            const photos = getPhotosArray(currentItem.photo_url, currentItem.titre);
            const mainImg = document.getElementById('modalImg');
            const gallery = document.getElementById('modalGallery');
            
            // On s'assure de réinitialiser à la première photo au chargement de la modale
            mainImg.src = normalizeImageUrl(photos[0], currentItem.titre);
            gallery.innerHTML = '';
            if (photos.length > 1) {
                gallery.classList.remove('hidden');
                photos.forEach((url, i) => {
                    const thumb = document.createElement('div');
                    thumb.className = `w-16 h-16 rounded-lg overflow-hidden cursor-pointer border-2 transition-all flex-shrink-0 ${i === 0 ? 'thumb-active border-purple-500 shadow-sm' : 'border-transparent shadow-none'}`;
                    thumb.innerHTML = `<img src="${normalizeImageUrl(url, currentItem.titre)}" class="w-full h-full object-cover">`;
                    thumb.onclick = () => {
                        mainImg.src = normalizeImageUrl(url, currentItem.titre);
                        Array.from(gallery.children).forEach(c => {
                            c.classList.remove('thumb-active', 'border-purple-500', 'shadow-sm');
                            c.classList.add('border-transparent');
                        });
                        thumb.classList.add('thumb-active', 'border-purple-500', 'shadow-sm');
                    };
                    gallery.appendChild(thumb);
                });
            } else gallery.classList.add('hidden');

            document.getElementById('modalCat').textContent = currentItem.categorie || "RAQUETTE";
            document.getElementById('modalTitle').textContent = currentItem.titre;
            document.getElementById('modalPrice').textContent = currentItem.prix + "€";
            document.getElementById('modalDesc').textContent = currentItem.description || "Aucune description.";
            document.getElementById('modalLBCLink').href = currentItem.lien_leboncoin || "#";
            updateModalFavBtn();
            document.getElementById('detailModal').classList.remove('hidden');
            setTimeout(() => document.getElementById('modalContainer').classList.replace('scale-95', 'scale-100'), 10);
            document.body.classList.add('modal-open');
        };

        const toggleFavorite = (title) => {
            const idx = favorites.indexOf(title);
            if (idx > -1) favorites.splice(idx, 1); else favorites.push(title);
            localStorage.setItem('catalogue_favs', JSON.stringify(favorites));
            filterProducts();
        };

        const toggleFavoriteCurrent = () => { if (currentItem) { toggleFavorite(currentItem.titre); updateModalFavBtn(); } };

        const updateModalFavBtn = () => {
            const isFav = favorites.includes(currentItem.titre);
            document.getElementById('modalFavBtn').innerHTML = isFav ? `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 fill-rose-500 text-rose-500" viewBox="0 0 24 24" stroke="currentColor"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg> Retirer` : `Ajouter aux favoris`;
        };

        const filterProducts = () => {
            const s = document.getElementById('searchInput').value.toLowerCase();
            const c = document.getElementById('categoryFilter').value;
            const st = document.getElementById('statusFilter').value;
            const filtered = products.filter(p => {
                const textMatch = (p.titre + p.description).toLowerCase().includes(s);
                const catMatch = (c === 'all' || p.categorie === c);
                const statusMatch = (st === 'all' || (p.statut || 'Disponible') === st);
                return textMatch && catMatch && statusMatch && (!showOnlyFavs || favorites.includes(p.titre));
            });
            renderGrid(filtered);
        };

        const resetFilters = () => {
            document.getElementById('searchInput').value = '';
            document.getElementById('categoryFilter').value = 'all';
            document.getElementById('statusFilter').value = 'all';
            showOnlyFavs = false;
            filterProducts();
        };

        const init = async () => {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                products = data;
                const catSelect = document.getElementById('categoryFilter');
                catSelect.innerHTML = '<option value="all">Marques</option>';
                [...new Set(products.map(p => p.categorie).filter(Boolean))].forEach(cat => {
                    const o = document.createElement('option'); o.value = cat; o.textContent = cat; catSelect.appendChild(o);
                });
                document.getElementById('loader').classList.add('hidden');
                renderGrid(products);
            } catch (e) { document.getElementById('loader').innerHTML = "<div class='text-slate-400 font-bold'>Impossible de charger les données.</div>"; }
        };

        document.getElementById('showFavsBtn').onclick = function() {
            showOnlyFavs = !showOnlyFavs;
            this.classList.toggle('bg-rose-50');
            this.classList.toggle('border-rose-100');
            filterProducts();
        };

        document.getElementById('openAdminBtn').onclick = () => document.getElementById('loginModal').classList.remove('hidden');
        document.getElementById('cancelLogin').onclick = () => document.getElementById('loginModal').classList.add('hidden');
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            if (document.getElementById('adminPassword').value === ADMIN_PASSWORD) {
                document.getElementById('loginModal').classList.add('hidden');
                document.getElementById('adminModal').classList.remove('hidden');
                document.getElementById('adminPassword').value = '';
            } else alert("Erreur d'accès.");
        };
        document.getElementById('closeAdminBtn').onclick = () => document.getElementById('adminModal').classList.add('hidden');
        document.getElementById('adminForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitAdmin');
            btn.disabled = true; btn.textContent = "ENVOI...";
            try {
                const formData = new FormData(e.target);
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: new URLSearchParams(formData).toString() });
                e.target.reset(); document.getElementById('adminModal').classList.add('hidden');
                setTimeout(init, 2000);
            } catch (err) { alert("Erreur d'envoi."); }
            finally { btn.disabled = false; btn.textContent = "PUBLIER L'ANNONCE"; }
        };

        document.getElementById('searchInput').oninput = filterProducts;
        document.getElementById('categoryFilter').onchange = filterProducts;
        document.getElementById('statusFilter').onchange = filterProducts;
        document.getElementById('closeModal').onclick = () => {
            document.getElementById('modalContainer').classList.replace('scale-100', 'scale-95');
            setTimeout(() => { document.getElementById('detailModal').classList.add('hidden'); document.body.classList.remove('modal-open'); }, 200);
        };

        init();
    </script>
</body>
</html>

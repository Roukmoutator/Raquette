<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Encordées - Boutique de Raquettes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        
        :root { --primary: #0f172a; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            transition: background-color 0.3s ease; 
            -webkit-tap-highlight-color: transparent;
        }

        .modal-open { overflow: hidden; }

        .dynamic-title {
            background: linear-gradient(300deg, #3b82f6, #8b5cf6, #ec4899, #3b82f6);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-shift 12s ease infinite;
        }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .product-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @media (min-width: 768px) {
            .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        }
        
        .skeleton { 
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); 
            background-size: 200% 100%; 
            animation: loading 1.5s infinite; 
        }

        @keyframes loading { 
            0% { background-position: 200% 0; } 
            100% { background-position: -200% 0; } 
        }

        .glass { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px); 
        }

        .thumb-active { border-color: #8b5cf6 !important; transform: scale(0.95); opacity: 1 !important; }

        .img-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.2);
            transition: all 0.2s;
        }
        .img-dot.active {
            background: #8b5cf6;
            transform: scale(1.3);
        }

        /* Amélioration Scroll Barre Filtres Mobile */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Conteneur image optimisé */
        .img-container {
            background-color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: pan-y pinch-zoom;
        }
        .full-visible-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 1rem;
            user-select: none;
            -webkit-user-drag: none;
        }

        #shareMenu {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(20px);
            opacity: 0;
            pointer-events: none;
        }
        #shareMenu.active {
            transform: translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        @media (prefers-color-scheme: dark) {
            body { background-color: #020617; color: #f8fafc; }
            .glass { background: rgba(15, 23, 42, 0.9); border-color: rgba(255,255,255,0.1); }
            .bg-white { background-color: #1e293b; }
            .text-slate-900 { color: #f8fafc; }
            .img-container { background-color: #0f172a; }
            .bg-slate-50 { background-color: #0f172a; }
            .border-slate-100 { border-color: #334155; }
        }

        /* Animation Swipe */
        .swipe-hint {
            animation: swipe-hint-anim 2s ease-in-out infinite;
        }
        @keyframes swipe-hint-anim {
            0%, 100% { transform: translateX(0); opacity: 0; }
            50% { transform: translateX(-20px); opacity: 1; }
        }
    </style>
</head>
<body class="bg-[#fdfdfd] min-h-screen">

    <div id="app" class="max-w-7xl mx-auto px-4 sm:px-6 py-6 md:py-10">
        <header class="mb-8 md:mb-12 flex flex-col items-center relative">
            <div class="w-full flex justify-between items-center mb-6">
                <button id="showFavsBtn" class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-3 rounded-2xl shadow-sm hover:bg-rose-50 hover:border-rose-100 transition-all group" title="Voir mes favoris">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-400 group-hover:text-rose-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                    </svg>
                </button>
                <button id="openAdminBtn" class="bg-slate-900 dark:bg-slate-700 text-white px-5 py-3 rounded-2xl text-xs font-black shadow-lg hover:bg-slate-800 active:scale-95 transition-all flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd" /></svg>
                    <span>ADMIN</span>
                </button>
            </div>
            <h1 class="text-6xl md:text-8xl font-black text-slate-900 mb-2 tracking-tighter dynamic-title">Encordées</h1>
            <p class="text-slate-500 font-bold text-center tracking-[0.2em] uppercase text-[10px] md:text-xs">Sélection Premium & Objets Uniques</p>
        </header>

        <!-- Barre de filtres adaptative -->
        <div class="glass sticky top-4 md:top-6 z-40 p-2 md:p-4 rounded-[1.5rem] md:rounded-[2rem] shadow-xl border border-white/20 mb-8 md:mb-10">
            <div class="flex flex-col md:flex-row gap-2 md:gap-4 items-center">
                <div class="relative w-full md:flex-1">
                    <span class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                    </span>
                    <input type="text" id="searchInput" placeholder="Chercher un modèle..." class="w-full pl-12 pr-6 py-4 bg-white/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-4 focus:ring-purple-500/10 focus:border-purple-500 outline-none transition-all text-sm">
                </div>
                
                <div class="flex w-full md:w-auto gap-2 overflow-x-auto hide-scrollbar pb-1 md:pb-0 px-1">
                    <select id="categoryFilter" class="flex-none md:flex-1 min-w-[120px] px-4 py-3 bg-white/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none cursor-pointer text-xs font-bold appearance-none"><option value="all">Toutes Marques</option></select>
                    <select id="statusFilter" class="flex-none md:flex-1 min-w-[120px] px-4 py-3 bg-white/50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none cursor-pointer text-xs font-bold appearance-none">
                        <option value="all">Tous Statuts</option><option value="Disponible">Disponible</option><option value="Réservé">Réservé</option><option value="Vendu">Vendu</option>
                    </select>
                    <button onclick="resetFilters()" class="flex-none bg-slate-100 dark:bg-slate-800 px-4 py-3 rounded-2xl text-[10px] font-black text-slate-500 uppercase">Reset</button>
                </div>
            </div>
        </div>

        <div id="loader" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-8"><div class="rounded-[2rem] h-96 skeleton"></div><div class="rounded-[2rem] h-96 skeleton"></div><div class="rounded-[2rem] h-96 skeleton"></div><div class="rounded-[2rem] h-96 skeleton"></div></div>
        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-8"></div>
        <div id="noResult" class="hidden text-center py-32 text-slate-500 font-bold text-lg">Aucune raquette trouvée.</div>
    </div>

    <!-- Modale Détails Optimisée -->
    <div id="detailModal" class="fixed inset-0 z-50 hidden flex items-end md:items-center justify-center p-0 md:p-4 bg-slate-900/80 backdrop-blur-md transition-opacity">
        <div class="bg-white dark:bg-slate-900 w-full max-w-5xl rounded-t-[3rem] md:rounded-[3rem] shadow-2xl overflow-hidden relative max-h-[92vh] md:max-h-[95vh] overflow-y-auto transform transition-transform translate-y-full md:translate-y-0 md:scale-95" id="modalContainer">
            <div class="flex flex-col md:flex-row">
                <!-- Zone Image Mobile Friendly -->
                <div class="w-full md:w-3/5 relative flex flex-col bg-slate-50 dark:bg-slate-950 border-r border-slate-100 dark:border-slate-800">
                    <div class="flex-grow img-container h-[400px] md:h-[650px] relative" id="swipeArea">
                        <img id="modalImg" src="" class="full-visible-img transition-opacity duration-300">
                        
                        <!-- Swipe Hint (Mobile Only) -->
                        <div class="absolute bottom-10 right-6 md:hidden flex flex-col items-center gap-1 opacity-40 pointer-events-none swipe-hint" id="swipeHint">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7" /></svg>
                            <span class="text-[8px] font-bold uppercase">Swipe</span>
                        </div>
                    </div>
                    
                    <div id="modalGallery" class="flex gap-3 p-4 overflow-x-auto bg-white/50 dark:bg-slate-900/50 backdrop-blur-sm hide-scrollbar border-t border-slate-100 dark:border-slate-800"></div>
                    
                    <!-- Bouton Fermer Flottant Mobile -->
                    <button id="closeModal" class="absolute top-6 left-6 bg-white/90 dark:bg-slate-800/90 p-3 rounded-full shadow-lg text-slate-900 dark:text-white z-20 active:scale-90 transition-transform">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                    </button>
                </div>

                <!-- Zone Infos -->
                <div class="w-full md:w-2/5 p-8 md:p-12 flex flex-col">
                    <div class="mb-8">
                        <span id="modalCat" class="text-[10px] font-black text-purple-600 uppercase tracking-widest mb-2 block"></span>
                        <h2 id="modalTitle" class="text-3xl md:text-5xl font-black text-slate-900 dark:text-white mb-4 leading-tight"></h2>
                        <div id="modalPrice" class="text-4xl font-light text-slate-400 dark:text-slate-500 mb-6"></div>
                        <p id="modalDesc" class="text-slate-600 dark:text-slate-400 leading-relaxed text-base md:text-lg"></p>
                    </div>
                    
                    <!-- Actions Mobiles Prioritaires -->
                    <div class="space-y-4 mt-auto">
                        <a id="modalLBCLink" href="#" target="_blank" class="block w-full bg-[#f56b2a] text-white font-black py-5 md:py-6 rounded-[2rem] text-center shadow-lg hover:bg-[#ff7e42] active:scale-95 transition-all uppercase tracking-widest text-sm">VOIR SUR LEBONCOIN</a>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <button onclick="toggleFavoriteCurrent()" id="modalFavBtn" class="bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-white font-bold py-5 rounded-[2rem] transition-all flex items-center justify-center gap-2 active:bg-slate-200">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg>
                                <span>Favori</span>
                            </button>
                            
                            <div class="relative">
                                <button onclick="handleShare(event)" class="w-full bg-slate-900 dark:bg-slate-700 text-white font-bold py-5 rounded-[2rem] transition-all flex items-center justify-center gap-2 active:scale-95">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" /></svg>
                                    <span>Partager</span>
                                </button>
                                
                                <div id="shareMenu" class="absolute bottom-full left-0 right-0 mb-4 bg-white dark:bg-slate-800 rounded-[2.5rem] shadow-2xl border border-slate-100 dark:border-slate-700 p-3 z-50 flex flex-col gap-1 md:block hidden">
                                    <button onclick="share('whatsapp')" class="flex items-center gap-3 w-full p-5 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-2xl transition-colors text-sm font-semibold">📱 WhatsApp</button>
                                    <button onclick="share('email')" class="flex items-center gap-3 w-full p-5 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-2xl transition-colors text-sm font-semibold">✉️ Email</button>
                                    <button onclick="share('copy')" class="flex items-center gap-3 w-full p-5 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-2xl transition-colors text-sm font-semibold border-t border-slate-50 dark:border-slate-700">🔗 Copier</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modales Admin inchangées mais rafraichies UI -->
    <div id="loginModal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-900 w-full max-w-sm rounded-[3rem] p-10 shadow-2xl">
            <h3 class="text-2xl font-black text-slate-900 dark:text-white mb-6">Accès Encordées</h3>
            <form id="loginForm" class="space-y-4">
                <input type="password" id="adminPassword" placeholder="Mot de passe" required class="w-full px-6 py-5 bg-slate-50 dark:bg-slate-800 border border-slate-100 dark:border-slate-700 rounded-[2rem] outline-none focus:ring-2 focus:ring-purple-500">
                <div class="flex gap-4 pt-2">
                    <button type="button" id="cancelLogin" class="flex-1 font-bold text-slate-400">RETOUR</button>
                    <button type="submit" class="flex-1 bg-slate-900 dark:bg-purple-600 text-white px-5 py-5 rounded-[2rem] font-bold">ENTRER</button>
                </div>
            </form>
        </div>
    </div>

    <div id="adminModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md">
        <div class="bg-white dark:bg-slate-900 w-full max-w-2xl rounded-[3rem] shadow-2xl p-8 md:p-12 max-h-[90vh] overflow-y-auto relative">
            <button id="closeAdminBtn" class="absolute top-8 right-8 text-slate-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
            <h2 class="text-3xl font-black mb-8 text-slate-900 dark:text-white">Nouveau Produit</h2>
            <form id="adminForm" class="space-y-5">
                <input type="text" name="titre" placeholder="Modèle" required class="w-full px-6 py-4 bg-slate-50 dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-700 outline-none">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" name="prix" placeholder="Prix (€)" required class="w-full px-6 py-4 bg-slate-50 dark:bg-slate-800 rounded-2xl outline-none border border-slate-100 dark:border-slate-700">
                    <input type="text" name="categorie" placeholder="Marque" required class="w-full px-6 py-4 bg-slate-50 dark:bg-slate-800 rounded-2xl outline-none border border-slate-100 dark:border-slate-700">
                </div>
                <select name="statut" class="w-full px-6 py-4 bg-slate-50 dark:bg-slate-800 rounded-2xl outline-none border border-slate-100 dark:border-slate-700"><option value="Disponible">Disponible</option><option value="Réservé">Réservé</option><option value="Vendu">Vendu</option></select>
                <textarea name="description" placeholder="Spécifications..." rows="3" class="w-full px-6 py-4 bg-slate-50 dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-700 outline-none resize-none"></textarea>
                <textarea name="photo_url" placeholder="URLs Photos (séparées par des virgules)" class="w-full px-6 py-4 bg-slate-50 dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-700 outline-none" rows="2"></textarea>
                <input type="url" name="lien_leboncoin" placeholder="Lien Leboncoin" class="w-full px-6 py-4 bg-slate-50 dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-700 outline-none">
                <button type="submit" id="submitAdmin" class="w-full bg-purple-600 text-white font-black py-5 rounded-[2rem] shadow-xl hover:bg-purple-700 transition-all uppercase tracking-widest">AJOUTER</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbyoUUiv0lsfD84HQuIuCMpWo4eJHlTXz11LFDN6ZqzlWkichE4Tjeiyvmf3T8oiG21SyQ/exec';
        const PASS = '1004';
        let products = [];
        let favorites = JSON.parse(localStorage.getItem('catalogue_favs')) || [];
        let currentItem = null;
        let showOnlyFavs = false;
        let currentImgIndex = 0;

        // Gestion du Swipe
        let touchStartX = 0;
        let touchEndX = 0;

        const handleSwipe = () => {
            if (!currentItem) return;
            const photos = getPhotosArray(currentItem.photo_url, currentItem.titre);
            if (photos.length <= 1) return;

            if (touchEndX < touchStartX - 50) { // Swipe Gauche -> Suivant
                currentImgIndex = (currentImgIndex + 1) % photos.length;
                updateModalImage(photos[currentImgIndex]);
            }
            if (touchEndX > touchStartX + 50) { // Swipe Droite -> Précédent
                currentImgIndex = (currentImgIndex - 1 + photos.length) % photos.length;
                updateModalImage(photos[currentImgIndex]);
            }
        };

        const updateModalImage = (url) => {
            const mainImg = document.getElementById('modalImg');
            mainImg.style.opacity = '0';
            setTimeout(() => {
                mainImg.src = normalizeImageUrl(url, currentItem.titre);
                mainImg.style.opacity = '1';
                
                // Update dots/thumbs
                const gallery = document.getElementById('modalGallery');
                Array.from(gallery.children).forEach((c, idx) => {
                    if (idx === currentImgIndex) {
                        c.classList.add('thumb-active', 'border-purple-500', 'shadow-sm', 'opacity-100');
                    } else {
                        c.classList.remove('thumb-active', 'border-purple-500', 'shadow-sm', 'opacity-100');
                    }
                });
            }, 150);
        };

        const getPhotosArray = (urlStr, title) => {
            if (!urlStr || urlStr.trim() === "") return [`https://placehold.co/800x1200/f1f5f9/64748b?text=${encodeURIComponent(title)}`];
            return urlStr.split(',').map(u => u.trim()).filter(u => u !== "");
        };

        const normalizeImageUrl = (url, title) => {
            if (!url) return `https://placehold.co/800x1200/f1f5f9/64748b?text=${encodeURIComponent(title || 'Image')}`;
            if (url.includes("drive.google.com")) {
                const id = url.match(/id=([^&]+)/)?.[1] || url.match(/\/d\/([^/]+)/)?.[1];
                return id ? `https://drive.google.com/thumbnail?id=${id}&sz=w1200` : url;
            }
            return url;
        };

        const isNewProduct = (date) => {
            if (!date) return false;
            return (new Date() - new Date(date)) / (1000 * 60 * 60 * 24) < 7;
        };

        const getStatusStyles = (status) => {
            const s = (status || '').toLowerCase();
            if (s === 'vendu') return 'bg-rose-50 text-rose-600 border-rose-100';
            if (s === 'réservé' || s === 'reserve') return 'bg-amber-50 text-amber-600 border-amber-100';
            return 'bg-emerald-50 text-emerald-600 border-emerald-100';
        };

        const renderGrid = (items) => {
            const grid = document.getElementById('productGrid');
            const noRes = document.getElementById('noResult');
            grid.innerHTML = '';
            if (items.length === 0) { noRes.classList.remove('hidden'); return; }
            noRes.classList.add('hidden');

            items.forEach(item => {
                const isFav = favorites.includes(item.titre);
                const photos = getPhotosArray(item.photo_url, item.titre);
                const card = document.createElement('div');
                card.className = 'product-card bg-white dark:bg-slate-900 rounded-[2.5rem] border border-slate-100 dark:border-slate-800 overflow-hidden shadow-sm flex flex-col h-full group relative';
                
                const titleForId = item.titre.replace(/\s+/g, '-');
                const titleForJs = item.titre.replace(/'/g, "\\'");
                
                let dotsHtml = '';
                if (photos.length > 1) {
                    dotsHtml = `<div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-1.5 z-20 bg-white/60 dark:bg-slate-800/60 backdrop-blur-md px-2 py-1.5 rounded-full md:opacity-0 group-hover:opacity-100 transition-opacity">`;
                    photos.forEach((_, idx) => {
                        dotsHtml += `<div class="img-dot ${idx === 0 ? 'active' : ''}" onclick="changeCardImage(event, '${titleForJs}', ${idx})"></div>`;
                    });
                    dotsHtml += `</div>`;
                }

                card.innerHTML = `
                    <div class="h-80 w-full relative overflow-hidden flex-shrink-0 cursor-pointer img-container" onclick="openModal('${titleForJs}')">
                        <img id="img-${titleForId}" src="${normalizeImageUrl(photos[0], item.titre)}" class="full-visible-img transition-all duration-700 md:group-hover:scale-110" loading="lazy">
                        ${dotsHtml}
                        ${isNewProduct(item.date_ajout) ? `<div class="absolute top-4 left-4"><span class="bg-purple-600 text-white rounded-full text-[9px] font-black uppercase px-3 py-1.5 shadow-lg">Nouveau</span></div>` : ''}
                        <div class="absolute top-4 right-4"><span class="px-3 py-1.5 rounded-full text-[9px] font-black uppercase border glass ${getStatusStyles(item.statut)}">${item.statut || 'Disponible'}</span></div>
                    </div>
                    <button onclick="toggleFavorite('${titleForJs}')" class="absolute top-[290px] right-8 z-10 bg-white dark:bg-slate-800 p-4 rounded-2xl shadow-xl hover:scale-110 active:scale-90 transition-all border border-slate-50 dark:border-slate-700">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 ${isFav ? 'fill-rose-500 text-rose-500' : 'text-slate-300'}" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg>
                    </button>
                    <div class="p-8 pt-8 flex flex-col justify-between flex-grow cursor-pointer" onclick="openModal('${titleForJs}')">
                        <div>
                            <span class="text-[10px] font-bold text-purple-600 uppercase tracking-widest">${item.categorie || 'Encordée'}</span>
                            <h3 class="text-xl md:text-2xl font-black text-slate-900 dark:text-white mt-1 mb-2 line-clamp-1">${item.titre}</h3>
                            <p class="text-slate-500 text-sm line-clamp-2 leading-relaxed">${item.description || "Détails à venir."}</p>
                        </div>
                        <div class="flex items-center justify-between mt-8">
                            <span class="text-3xl font-light text-slate-900 dark:text-slate-200">${item.prix}€</span>
                            <div class="w-12 h-12 rounded-full bg-slate-50 dark:bg-slate-800 flex items-center justify-center text-slate-400 group-hover:bg-purple-600 group-hover:text-white transition-all shadow-sm">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" /></svg>
                            </div>
                        </div>
                    </div>`;
                grid.appendChild(card);
            });
        };

        const openModal = (title) => {
            currentItem = products.find(p => p.titre === title);
            if (!currentItem) return;
            currentImgIndex = 0;
            const photos = getPhotosArray(currentItem.photo_url, currentItem.titre);
            const mainImg = document.getElementById('modalImg');
            const gallery = document.getElementById('modalGallery');
            
            mainImg.src = normalizeImageUrl(photos[0], currentItem.titre);
            gallery.innerHTML = '';
            
            if (photos.length > 1) {
                gallery.classList.remove('hidden');
                document.getElementById('swipeHint').classList.remove('hidden');
                photos.forEach((url, i) => {
                    const thumb = document.createElement('div');
                    thumb.className = `w-16 h-16 md:w-20 md:h-20 rounded-2xl overflow-hidden cursor-pointer border-2 transition-all flex-shrink-0 bg-slate-100 dark:bg-slate-800 ${i === 0 ? 'thumb-active border-purple-500 opacity-100' : 'border-transparent opacity-40'}`;
                    thumb.innerHTML = `<img src="${normalizeImageUrl(url, currentItem.titre)}" class="w-full h-full object-contain p-1">`;
                    thumb.onclick = () => {
                        currentImgIndex = i;
                        updateModalImage(url);
                    };
                    gallery.appendChild(thumb);
                });
            } else {
                gallery.classList.add('hidden');
                document.getElementById('swipeHint').classList.add('hidden');
            }

            document.getElementById('modalCat').textContent = currentItem.categorie || "ENCORDÉE";
            document.getElementById('modalTitle').textContent = currentItem.titre;
            document.getElementById('modalPrice').textContent = currentItem.prix + "€";
            document.getElementById('modalDesc').textContent = currentItem.description || "Aucune description disponible.";
            document.getElementById('modalLBCLink').href = currentItem.lien_leboncoin || "#";
            updateModalFavBtn();
            
            const modal = document.getElementById('detailModal');
            const container = document.getElementById('modalContainer');
            modal.classList.remove('hidden');
            setTimeout(() => {
                container.classList.remove('translate-y-full', 'scale-95');
                container.classList.add('translate-y-0', 'scale-100');
            }, 50);
            document.body.classList.add('modal-open');
        };

        const handleShare = (e) => {
            if (navigator.share) {
                const url = currentItem.lien_leboncoin || window.location.href;
                navigator.share({
                    title: `Raquette Encordées : ${currentItem.titre}`,
                    text: `Regarde cette raquette : ${currentItem.titre} à ${currentItem.prix}€`,
                    url: url
                }).catch(() => toggleShareMenu(e));
            } else {
                toggleShareMenu(e);
            }
        };

        const toggleShareMenu = (e) => { 
            e.stopPropagation(); 
            const menu = document.getElementById('shareMenu');
            menu.classList.toggle('active'); 
            menu.classList.toggle('hidden');
        };

        const share = (platform) => {
            if (!currentItem) return;
            const text = `Raquette Encordées : ${currentItem.titre} (${currentItem.prix}€)`;
            const url = currentItem.lien_leboncoin || window.location.href;
            if (platform === 'whatsapp') window.open(`https://wa.me/?text=${encodeURIComponent(text + ' ' + url)}`, '_blank');
            else if (platform === 'email') window.location.href = `mailto:?subject=${encodeURIComponent('Raquette Encordées')}&body=${encodeURIComponent(text + '\n\n' + url)}`;
            else if (platform === 'copy') {
                const dummy = document.createElement('input'); document.body.appendChild(dummy); dummy.value = url; dummy.select();
                document.execCommand('copy'); document.body.removeChild(dummy); 
                const btn = event.target;
                const old = btn.textContent;
                btn.textContent = "Copié ! ✅";
                setTimeout(() => btn.textContent = old, 2000);
            }
        };

        const toggleFavorite = (title) => {
            const idx = favorites.indexOf(title);
            if (idx > -1) favorites.splice(idx, 1); else favorites.push(title);
            localStorage.setItem('catalogue_favs', JSON.stringify(favorites));
            filterProducts();
        };

        const toggleFavoriteCurrent = () => { if (currentItem) { toggleFavorite(currentItem.titre); updateModalFavBtn(); } };

        const updateModalFavBtn = () => {
            const isFav = favorites.includes(currentItem.titre);
            document.getElementById('modalFavBtn').innerHTML = isFav ? 
                `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 fill-rose-500 text-rose-500" viewBox="0 0 24 24" stroke="currentColor"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg> <span>Retirer</span>` : 
                `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg> <span>Favori</span>`;
        };

        window.changeCardImage = (event, productId, photoIdx) => {
            event.stopPropagation();
            const product = products.find(p => p.titre === productId);
            if (!product) return;
            const photos = getPhotosArray(product.photo_url, product.titre);
            const imgEl = document.getElementById(`img-${productId.replace(/\s+/g, '-')}`);
            if (imgEl) imgEl.src = normalizeImageUrl(photos[photoIdx], product.titre);
            const dots = event.target.parentElement.children;
            for (let dot of dots) dot.classList.remove('active');
            event.target.classList.add('active');
        };

        const filterProducts = () => {
            const s = document.getElementById('searchInput').value.toLowerCase();
            const c = document.getElementById('categoryFilter').value;
            const st = document.getElementById('statusFilter').value;
            const filtered = products.filter(p => {
                const textMatch = (p.titre + p.description).toLowerCase().includes(s);
                const catMatch = (c === 'all' || p.categorie === c);
                const statusMatch = (st === 'all' || (p.statut || 'Disponible') === st);
                return textMatch && catMatch && statusMatch && (!showOnlyFavs || favorites.includes(p.titre));
            });
            renderGrid(filtered);
        };

        const resetFilters = () => {
            document.getElementById('searchInput').value = '';
            document.getElementById('categoryFilter').value = 'all';
            document.getElementById('statusFilter').value = 'all';
            showOnlyFavs = false;
            document.getElementById('showFavsBtn').classList.remove('bg-rose-50', 'border-rose-100');
            filterProducts();
        };

        const init = async () => {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                products = data;
                const catSelect = document.getElementById('categoryFilter');
                catSelect.innerHTML = '<option value="all">Marques</option>';
                [...new Set(products.map(p => p.categorie).filter(Boolean))].forEach(cat => {
                    const o = document.createElement('option'); o.value = cat; o.textContent = cat; catSelect.appendChild(o);
                });
                document.getElementById('loader').classList.add('hidden');
                renderGrid(products);
            } catch (e) { 
                document.getElementById('loader').innerHTML = "<div class='text-slate-400 font-bold col-span-full text-center'>Erreur de chargement.</div>"; 
            }
        };

        // Swipe Events
        const swipeArea = document.getElementById('swipeArea');
        swipeArea.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, {passive: true});
        swipeArea.addEventListener('touchend', e => { touchEndX = e.changedTouches[0].screenX; handleSwipe(); }, {passive: true});

        document.getElementById('showFavsBtn').onclick = function() {
            showOnlyFavs = !showOnlyFavs;
            this.classList.toggle('bg-rose-50'); this.classList.toggle('border-rose-100');
            filterProducts();
        };

        document.getElementById('openAdminBtn').onclick = () => document.getElementById('loginModal').classList.remove('hidden');
        document.getElementById('cancelLogin').onclick = () => document.getElementById('loginModal').classList.add('hidden');
        document.getElementById('closeAdminBtn').onclick = () => document.getElementById('adminModal').classList.add('hidden');
        
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            if (document.getElementById('adminPassword').value === PASS) {
                document.getElementById('loginModal').classList.add('hidden');
                document.getElementById('adminModal').classList.remove('hidden');
            } else alert("Accès refusé.");
        };

        document.getElementById('adminForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitAdmin');
            btn.disabled = true; btn.textContent = "ENVOI...";
            try {
                const formData = new FormData(e.target);
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: new URLSearchParams(formData).toString() });
                e.target.reset(); document.getElementById('adminModal').classList.add('hidden');
                setTimeout(init, 2000);
            } catch (err) { alert("Erreur."); }
            finally { btn.disabled = false; btn.textContent = "AJOUTER"; }
        };

        document.getElementById('searchInput').oninput = filterProducts;
        document.getElementById('categoryFilter').onchange = filterProducts;
        document.getElementById('statusFilter').onchange = filterProducts;
        
        document.addEventListener('click', (e) => {
            const menu = document.getElementById('shareMenu');
            if (menu && !menu.classList.contains('hidden') && !e.target.closest('#shareMenu') && !e.target.closest('button')) {
                menu.classList.add('hidden');
                menu.classList.remove('active');
            }
        });

        document.getElementById('closeModal').onclick = () => {
            const container = document.getElementById('modalContainer');
            if(window.innerWidth < 768) {
                container.classList.add('translate-y-full');
            } else {
                container.classList.add('scale-95');
            }
            setTimeout(() => { 
                document.getElementById('detailModal').classList.add('hidden'); 
                document.body.classList.remove('modal-open'); 
            }, 300);
        };

        init();
    </script>
</body>
</html>
